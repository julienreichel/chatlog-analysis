version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --workspace=amplify
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm run aws:ci-check
        - npm ci --workspace=app
    build:
      commands:
        - npm run build --workspace=app
  artifacts:
    baseDirectory: app/.amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - app/node_modules/**/*
